steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--no-cache'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/cloud-run-source-deploy/plasyect/${_SERVICE_NAME}:$COMMIT_SHA'
      - '.'
      - '-f'
      - 'Dockerfile'
    id: 'Build'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/cloud-run-source-deploy/plasyect/${_SERVICE_NAME}:$COMMIT_SHA'
    id: 'Push'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--platform=managed'
      - '--image=${_REGION}-docker.pkg.dev/${_PROJECT_ID}/cloud-run-source-deploy/plasyect/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--ingress=all'
      - '--allow-unauthenticated'
      - '--quiet'
    id: 'Deploy'

images:
  - '${_REGION}-docker.pkg.dev/${_PROJECT_ID}/cloud-run-source-deploy/plasyect/${_SERVICE_NAME}:$COMMIT_SHA'

substitutions:
  _PROJECT_ID: dashboard-plasyect
  _REGION: us-central1
  _SERVICE_NAME: plasyect-ocr-service

options:
  logging: CLOUD_LOGGING_ONLY
